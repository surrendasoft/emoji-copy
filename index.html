<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoji Stash</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Emoji Stash</h1>
        <p class="subtitle">Search for an emoji, click to copy, then paste into WhatsApp.</p>
      </header>

      <section class="search-bar">
        <input
          type="search"
          id="search-input"
          class="search-input"
          placeholder="Search… e.g. happy, heart, fire, thumbs up"
          autofocus
        />
        <p class="result-count" id="result-count"></p>
      </section>

      <section class="emoji-grid" id="emoji-grid"></section>
      <p class="empty-state" id="empty-state" hidden>No emojis match that search.</p>
    </div>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
